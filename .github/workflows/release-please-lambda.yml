name: Prepare Release Lambda

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  update-lambda-hash:
    if: github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.head.ref, 'release-please--') && github.event.pull_request.user.login == 'app/github-actions'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/lambda
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: cmd/lambda/go.mod

      - name: Build deterministic Lambda zip
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -buildvcs=false -tags lambda.norpc -ldflags='-s -w -buildid=' -o bootstrap
          TZ=UTC touch -t 198001010000 bootstrap
          zip -q -X lambda.zip bootstrap

      - name: Read release version
        id: release-version
        run: echo "release_version=$(jq -r '."."' ../../.release-please-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Read Lambda hash
        id: lambda-hash
        run: echo "lambda_hash=$(openssl dgst -sha256 -binary lambda.zip | openssl base64 -A)" >> "$GITHUB_OUTPUT"

      - name: Update committed Lambda metadata
        env:
          RELEASE_VERSION: ${{ steps.release-version.outputs.release_version }}
          LAMBDA_HASH: ${{ steps.lambda-hash.outputs.lambda_hash }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          Path("../../.lambda-release.json").write_text(
              json.dumps(
                  {
                      "version": os.environ["RELEASE_VERSION"],
                      "base64sha256": os.environ["LAMBDA_HASH"],
                  },
                  indent=2,
              )
              + "\n"
          )
          PY

      - name: Commit metadata update
        working-directory: .
        run: |
          if git diff --quiet -- .lambda-release.json; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .lambda-release.json
          git commit -m "chore: update lambda release hash"
          git push
