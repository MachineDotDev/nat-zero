name: Promote First-Party AMI Release

on:
  workflow_dispatch:
    inputs:
      source_ami_id:
        description: Source AMI ID to promote as module default
        required: true
        type: string
      source_region:
        description: Source AMI region
        required: true
        default: us-east-1
        type: string

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AMI_PUBLISH_ROLE_ARN }}
          aws-region: ${{ inputs.source_region }}

      - name: Pin default AMI name
        run: ./ami/first-party/scripts/promote-default-ami.sh --source-ami-id "${{ inputs.source_ami_id }}" --source-region "${{ inputs.source_region }}"

      - name: Refresh terraform-docs outputs
        run: |
          python3 -m pip install --user pre-commit
          export PATH="$HOME/.local/bin:$PATH"
          pre-commit run terraform-docs-go --all-files

      - name: Resolve AMI name
        id: ami
        run: |
          ami_name="$(aws ec2 describe-images \
            --region "${{ inputs.source_region }}" \
            --image-ids "${{ inputs.source_ami_id }}" \
            --query 'Images[0].Name' \
            --output text)"

          if [[ -z "$ami_name" || "$ami_name" == "None" ]]; then
            echo "Unable to resolve AMI name for ${{ inputs.source_ami_id }} in ${{ inputs.source_region }}" >&2
            exit 1
          fi

          echo "ami_name=$ami_name" >> "$GITHUB_OUTPUT"

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes detected after promotion."
            exit 0
          fi

          ami_name="${{ steps.ami.outputs.ami_name }}"
          branch="automation/promote-first-party-ami-${{ github.run_id }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$branch"
          git add -A
          git commit -m "feat(ami): promote first-party AMI ${ami_name}"
          git push --set-upstream origin "$branch"

          gh pr create \
            --base main \
            --head "$branch" \
            --title "feat(ami): promote first-party AMI ${ami_name}" \
            --body "Promotes the default first-party AMI lookup target to \`${ami_name}\`.

- Source AMI ID: \`${{ inputs.source_ami_id }}\`
- Source region: \`${{ inputs.source_region }}\`
- Generated by workflow: \`${{ github.workflow }}\`"
