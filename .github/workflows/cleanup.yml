name: Cleanup
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: integration
    steps:
      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ secrets.INTEGRATION_ROLE_ARN }}
          aws-region: us-east-1
      - run: |
          aws logs delete-log-group --log-group-name /aws/lambda/nat-test-nat-zero || true
          aws logs describe-log-groups --log-group-name-prefix /aws/lambda/nat-test --query "logGroups[].logGroupName" --output text
          echo "Done"
