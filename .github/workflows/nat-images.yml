name: Build And Promote First-Party AMI

on:
  workflow_dispatch:
    inputs:
      source_region:
        description: Region where the AMI is built
        required: true
        default: us-east-1
        type: string
      build_subnet_id:
        description: Public subnet ID used for the Packer builder instance
        required: true
        type: string

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  release_ami:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AMI_PUBLISH_ROLE_ARN }}
          aws-region: ${{ inputs.source_region }}

      - uses: hashicorp/setup-packer@main

      - name: Build first-party AMI
        id: build
        working-directory: ami/first-party
        run: |
          packer init nat-zero.pkr.hcl
          packer build -machine-readable \
            -var "region=${{ inputs.source_region }}" \
            -var "subnet_id=${{ inputs.build_subnet_id }}" \
            nat-zero.pkr.hcl | tee /tmp/packer.log

          artifact="$(awk -F',' '$3 == "artifact" && $4 == "0" && $5 == "id" { print $6 }' /tmp/packer.log | tail -1)"
          if [[ -z "$artifact" ]]; then
            echo "Failed to resolve built AMI artifact from Packer output." >&2
            exit 1
          fi

          source_ami_id="${artifact##*:}"
          if [[ -z "$source_ami_id" ]]; then
            echo "Failed to parse source AMI ID from artifact: $artifact" >&2
            exit 1
          fi

          ami_name="$(aws ec2 describe-images \
            --region "${{ inputs.source_region }}" \
            --image-ids "$source_ami_id" \
            --query 'Images[0].Name' \
            --output text)"

          if [[ -z "$ami_name" || "$ami_name" == "None" ]]; then
            echo "Unable to resolve AMI name for $source_ami_id" >&2
            exit 1
          fi

          if [[ "$ami_name" != nat-zero-al2023-minimal-arm64-* ]]; then
            echo "Unexpected AMI name: $ami_name" >&2
            exit 1
          fi

          echo "source_ami_id=$source_ami_id" >> "$GITHUB_OUTPUT"
          echo "ami_name=$ami_name" >> "$GITHUB_OUTPUT"
          echo "Built source AMI: $source_ami_id ($ami_name)"

      - name: Copy AMI to enabled regions
        id: copy
        run: |
          source_region="${{ inputs.source_region }}"
          source_ami_id="${{ steps.build.outputs.source_ami_id }}"
          ami_name="${{ steps.build.outputs.ami_name }}"

          mapfile -t regions < <(
            aws account list-regions \
              --region-opt-status-contains ENABLED ENABLED_BY_DEFAULT \
              --query 'Regions[].RegionName' \
              --output text | tr '\t' '\n' | sed '/^$/d' | sort
          )

          if [[ "${#regions[@]}" -eq 0 ]]; then
            echo "No enabled regions returned by account:list-regions" >&2
            exit 1
          fi

          copied_table="${source_region}:${source_ami_id}"

          for region in "${regions[@]}"; do
            if [[ "$region" == "$source_region" ]]; then
              continue
            fi

            existing_id="$(aws ec2 describe-images \
              --region "$region" \
              --owners self \
              --filters \
                "Name=source-image-id,Values=${source_ami_id}" \
                "Name=name,Values=${ami_name}" \
              --query 'Images[0].ImageId' \
              --output text 2>/dev/null || true)"

            if [[ -n "$existing_id" && "$existing_id" != "None" ]]; then
              ami_id="$existing_id"
              echo "[$region] already exists: $ami_id"
            else
              ami_id="$(aws ec2 copy-image \
                --region "$region" \
                --source-region "$source_region" \
                --source-image-id "$source_ami_id" \
                --name "$ami_name" \
                --description "Copy of ${source_ami_id} from ${source_region}" \
                --copy-image-tags \
                --query 'ImageId' \
                --output text)"

              echo "[$region] copy started: $ami_id"
            fi

            aws ec2 wait image-available --region "$region" --image-ids "$ami_id"
            echo "[$region] available: $ami_id"

            copied_table+=$'\n'"${region}:${ami_id}"
          done

          {
            echo 'copied_table<<EOF'
            echo "$copied_table"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Pin module default AMI and refresh docs
        run: |
          ami_name="${{ steps.build.outputs.ami_name }}"

          awk -v ami_name="$ami_name" '
          BEGIN { in_block = 0; updated = 0 }
          $0 ~ /^variable "first_party_ami_name_pattern" \{/ { in_block = 1 }
          in_block && $0 ~ /^[[:space:]]*default[[:space:]]*=/ {
            sub(/"[^"]*"/, "\"" ami_name "\"")
            updated = 1
          }
          in_block && $0 ~ /^\}/ { in_block = 0 }
          { print }
          END {
            if (!updated) {
              print "Failed to update first_party_ami_name_pattern default in variables.tf" > "/dev/stderr"
              exit 1
            }
          }
          ' variables.tf > /tmp/variables.tf && mv /tmp/variables.tf variables.tf

          python3 -m pip install --user pre-commit
          export PATH="$HOME/.local/bin:$PATH"
          pre-commit run terraform-docs-go --all-files

      - name: Create promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes detected after AMI promotion."
            exit 0
          fi

          ami_name="${{ steps.build.outputs.ami_name }}"
          source_ami_id="${{ steps.build.outputs.source_ami_id }}"
          branch="automation/promote-first-party-ami-${{ github.run_id }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$branch"
          git add -A
          git commit -m "feat(ami): promote first-party AMI ${ami_name}"
          git push --set-upstream origin "$branch"

          cat > /tmp/pr_body.md <<EOF
          Built and promoted first-party NAT AMI.

          - Source AMI ID: \`${source_ami_id}\`
          - Source region: \`${{ inputs.source_region }}\`
          - AMI name: \`${ami_name}\`

          Copied AMIs:
          \`\`\`
          ${{ steps.copy.outputs.copied_table }}
          \`\`\`
          EOF

          gh pr create \
            --base main \
            --head "$branch" \
            --title "feat(ami): promote first-party AMI ${ami_name}" \
            --body-file /tmp/pr_body.md
