name: NAT Images

on:
  workflow_dispatch:
    inputs:
      build_subnet_id:
        description: Public subnet ID to use for the Packer builder instance
        required: true
        type: string
      source_region:
        description: Region where the AMI is built before being copied globally
        required: false
        default: us-east-1
        type: string
      run_integration_gate:
        description: Run the us-east-1 integration gates before publishing and promoting the AMI
        required: false
        default: true
        type: boolean

concurrency:
  group: nat-zero-ami
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  TEST_NAT_AMI_ID: ${{ vars.NAT_ZERO_TEST_AMI_ID }}

jobs:
  build-and-copy:
    runs-on: ubuntu-latest
    environment: ami-build
    outputs:
      ami_name: ${{ steps.metadata.outputs.ami_name }}
      owner_account_id: ${{ steps.metadata.outputs.owner_account_id }}
      source_ami_id: ${{ steps.build.outputs.source_ami_id }}
      test_ami_id: ${{ steps.test-ami.outputs.test_ami_id }}
      regions_json: ${{ steps.regions.outputs.regions_json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-packer@1aa358be5cf73883762b302a3a03abd66e75b232 # v3

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AMI_BUILD_ROLE_ARN }}
          aws-region: ${{ inputs.source_region }}

      - name: Build AMI
        id: build
        working-directory: ami
        run: |
          rm -f manifest.json
          packer init nat-zero.pkr.hcl
          packer build \
            -color=false \
            -var "region=${{ inputs.source_region }}" \
            -var "subnet_id=${{ inputs.build_subnet_id }}" \
            nat-zero.pkr.hcl

          source_ami_id="$(jq -r '.builds[-1].artifact_id' manifest.json | awk -F: '{print $2}')"
          if [ -z "$source_ami_id" ] || [ "$source_ami_id" = "null" ]; then
            echo "failed to determine source AMI ID from ami/manifest.json" >&2
            exit 1
          fi

          echo "source_ami_id=$source_ami_id" >> "$GITHUB_OUTPUT"

      - name: Resolve AMI metadata
        id: metadata
        env:
          SOURCE_AMI_ID: ${{ steps.build.outputs.source_ami_id }}
        run: |
          owner_account_id="$(aws sts get-caller-identity --query 'Account' --output text)"
          ami_name="$(aws ec2 describe-images --region "${{ inputs.source_region }}" --image-ids "$SOURCE_AMI_ID" --query 'Images[0].Name' --output text)"

          echo "owner_account_id=$owner_account_id" >> "$GITHUB_OUTPUT"
          echo "ami_name=$ami_name" >> "$GITHUB_OUTPUT"

      - name: Resolve enabled regions
        id: regions
        run: |
          regions_json="$(aws ec2 describe-regions --all-regions --query "Regions[?OptInStatus=='opt-in-not-required' || OptInStatus=='opted-in'].RegionName" --output json | jq -c 'sort')"
          echo "regions_json=$regions_json" >> "$GITHUB_OUTPUT"

      - name: Copy AMI to enabled regions
        env:
          AMI_NAME: ${{ steps.metadata.outputs.ami_name }}
          REGIONS_JSON: ${{ steps.regions.outputs.regions_json }}
          SOURCE_AMI_ID: ${{ steps.build.outputs.source_ami_id }}
          SOURCE_REGION: ${{ inputs.source_region }}
        run: |
          copy_region() {
            local region="$1"
            local attempt
            local err_file
            local image_id

            err_file="$(mktemp)"
            trap 'rm -f "$err_file"' RETURN

            for attempt in 1 2 3 4 5; do
              image_id="$(aws ec2 copy-image \
                --region "$region" \
                --source-region "$SOURCE_REGION" \
                --source-image-id "$SOURCE_AMI_ID" \
                --name "$AMI_NAME" \
                --description "nat-zero AMI copied from $SOURCE_REGION" \
                --query 'ImageId' \
                --output text 2>"$err_file")" && break
              sleep $((attempt * 5))
            done

            if [ -z "${image_id:-}" ] || [ "$image_id" = "None" ]; then
              cat "$err_file" >&2 || true
              return 1
            fi

            aws ec2 wait image-available --region "$region" --image-ids "$image_id"
          }

          pids=()

          while IFS= read -r region; do
            if [ "$region" = "$SOURCE_REGION" ]; then
              continue
            fi

            (
              set -euo pipefail
              copy_region "$region"
            ) &
            pids+=("$!")
          done < <(jq -r '.[]' <<<"$REGIONS_JSON")

          status=0
          for pid in "${pids[@]}"; do
            if ! wait "$pid"; then
              status=1
            fi
          done

          exit "$status"

      - name: Resolve us-east-1 test AMI
        id: test-ami
        env:
          AMI_NAME: ${{ steps.metadata.outputs.ami_name }}
          OWNER_ACCOUNT_ID: ${{ steps.metadata.outputs.owner_account_id }}
          SOURCE_AMI_ID: ${{ steps.build.outputs.source_ami_id }}
        run: |
          if [ "${{ inputs.source_region }}" = "us-east-1" ]; then
            test_ami_id="$SOURCE_AMI_ID"
          else
            test_ami_id="$(aws ec2 describe-images \
              --region us-east-1 \
              --owners "$OWNER_ACCOUNT_ID" \
              --filters "Name=name,Values=$AMI_NAME" "Name=state,Values=available" \
              --query 'Images[0].ImageId' \
              --output text)"
          fi

          if [ -z "$test_ami_id" ] || [ "$test_ami_id" = "None" ]; then
            echo "failed to resolve the us-east-1 AMI copy for $AMI_NAME" >&2
            exit 1
          fi

          echo "test_ami_id=$test_ami_id" >> "$GITHUB_OUTPUT"

  integration-new-ami:
    if: ${{ inputs.run_integration_gate }}
    needs: build-and-copy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: integration
    env:
      NAT_ZERO_TEST_NAT_AMI_ID: ${{ needs.build-and-copy.outputs.test_ami_id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: tests/integration/go.mod

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.INTEGRATION_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build Lambda binary
        working-directory: cmd/lambda
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -tags lambda.norpc -ldflags='-s -w' -o bootstrap
          zip lambda.zip bootstrap
          mkdir -p ../../.build
          cp lambda.zip ../../.build/lambda.zip

      - name: Test new AMI directly
        working-directory: tests/integration
        run: go test -v -timeout 10m -count=1

  integration-ami-upgrade:
    if: ${{ inputs.run_integration_gate }}
    needs:
      - build-and-copy
      - integration-new-ami
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: integration
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: tests/integration/go.mod

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.INTEGRATION_ROLE_ARN }}
          aws-region: us-east-1

      - name: Resolve baseline NAT AMI
        run: |
          if [ -z "$TEST_NAT_AMI_ID" ]; then
            echo "baseline integration NAT AMI is not configured" >&2
            exit 1
          fi

          echo "NAT_ZERO_TEST_NAT_AMI_ID=$TEST_NAT_AMI_ID" >> "$GITHUB_ENV"
          echo "NAT_ZERO_TEST_UPDATED_NAT_AMI_ID=${{ needs.build-and-copy.outputs.test_ami_id }}" >> "$GITHUB_ENV"

      - name: Build Lambda binary
        working-directory: cmd/lambda
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -tags lambda.norpc -ldflags='-s -w' -o bootstrap
          zip lambda.zip bootstrap
          mkdir -p ../../.build
          cp lambda.zip ../../.build/lambda.zip

      - name: Test AMI upgrade path
        working-directory: tests/integration
        run: go test -v -timeout 15m -count=1

  publish-public:
    needs:
      - build-and-copy
      - integration-new-ami
      - integration-ami-upgrade
    if: >-
      always() &&
      needs.build-and-copy.result == 'success' &&
      (
        inputs.run_integration_gate == false ||
        (needs.integration-new-ami.result == 'success' && needs.integration-ami-upgrade.result == 'success')
      )
    runs-on: ubuntu-latest
    environment: ami-build
    steps:
      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AMI_BUILD_ROLE_ARN }}
          aws-region: ${{ inputs.source_region }}

      - name: Make copied AMIs public
        env:
          AMI_NAME: ${{ needs.build-and-copy.outputs.ami_name }}
          OWNER_ACCOUNT_ID: ${{ needs.build-and-copy.outputs.owner_account_id }}
          REGIONS_JSON: ${{ needs.build-and-copy.outputs.regions_json }}
        run: |
          while IFS= read -r region; do
            image_id="$(aws ec2 describe-images \
              --region "$region" \
              --owners "$OWNER_ACCOUNT_ID" \
              --filters "Name=name,Values=$AMI_NAME" "Name=state,Values=available" \
              --query 'Images[0].ImageId' \
              --output text)"

            if [ -z "$image_id" ] || [ "$image_id" = "None" ]; then
              echo "failed to resolve image for $region" >&2
              exit 1
            fi

            aws ec2 modify-image-attribute \
              --region "$region" \
              --image-id "$image_id" \
              --launch-permission 'Add=[{Group=all}]'
          done < <(jq -r '.[]' <<<"$REGIONS_JSON")

  open-promotion-pr:
    needs:
      - build-and-copy
      - publish-public
    if: ${{ needs.publish-public.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_wrapper: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: cmd/lambda/go.mod

      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit

      - name: Update promoted AMI defaults
        env:
          AMI_NAME: ${{ needs.build-and-copy.outputs.ami_name }}
          OWNER_ACCOUNT_ID: ${{ needs.build-and-copy.outputs.owner_account_id }}
        run: |
          bash scripts/update_ami_defaults.sh "$OWNER_ACCOUNT_ID" "$AMI_NAME"
          terraform fmt -recursive
          pre-commit run terraform-docs-go --all-files

      - name: Create or update promotion PR
        env:
          AMI_NAME: ${{ needs.build-and-copy.outputs.ami_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch_name="automation/promote-nat-zero-ami-$(tr -cs '[:alnum:]' '-' <<<"$AMI_NAME" | sed 's/^-//; s/-$//' | tr '[:upper:]' '[:lower:]')"
          commit_title="feat: promote nat-zero AMI ${AMI_NAME}"
          pr_title="$commit_title"
          pr_body=$'Promotes the default nat-zero AMI after the automated Packer build, global copy, and us-east-1 integration gates passed.\n\nSquash-merge this PR to preserve the `feat:` title so release-please cuts the next module release PR.'

          if git diff --quiet; then
            echo "no default changes detected; nothing to promote"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$branch_name"
          git add variables.tf README.md docs/reference.md
          git commit -m "$commit_title"
          git push --force --set-upstream origin "$branch_name"

          pr_number="$(gh pr list --head "$branch_name" --json number --jq '.[0].number')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "$pr_title" --body "$pr_body"
          else
            gh pr create --base main --head "$branch_name" --title "$pr_title" --body "$pr_body"
          fi
