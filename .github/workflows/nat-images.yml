name: Build And Promote First-Party AMI

on:
  workflow_dispatch:
    inputs:
      source_region:
        description: Region where the AMI is built
        required: true
        default: us-east-1
        type: string
      build_subnet_id:
        description: Public subnet ID used for the Packer builder instance
        required: true
        type: string
      role_to_assume:
        description: Optional AWS role ARN override
        required: false
        default: ""
        type: string
      run_integration_gate:
        description: Run integration tests against the newly built AMI before publish
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      source_region:
        required: true
        type: string
      build_subnet_id:
        required: true
        type: string
      role_to_assume:
        required: false
        type: string
      run_integration_gate:
        required: false
        type: boolean

concurrency:
  group: nat-zero-ami-release
  cancel-in-progress: false

jobs:
  build_ami:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: release
    permissions:
      id-token: write
      contents: read
    outputs:
      source_ami_id: ${{ steps.build.outputs.source_ami_id }}
      ami_name: ${{ steps.build.outputs.ami_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ inputs.role_to_assume || secrets.AMI_BUILD_ROLE_ARN }}
          aws-region: ${{ inputs.source_region }}

      - uses: hashicorp/setup-packer@main

      - name: Build first-party AMI
        id: build
        working-directory: ami/first-party
        run: |
          set -euo pipefail

          source_region="${{ inputs.source_region }}"

          packer init nat-zero.pkr.hcl
          packer build -machine-readable \
            -var "region=${source_region}" \
            -var "subnet_id=${{ inputs.build_subnet_id }}" \
            nat-zero.pkr.hcl | tee /tmp/packer.log

          artifact="$(awk -F',' '$3 == "artifact" && $4 == "0" && $5 == "id" { print $6 }' /tmp/packer.log | tail -1)"
          if [[ -z "$artifact" ]]; then
            echo "Failed to resolve built AMI artifact from Packer output." >&2
            exit 1
          fi

          source_ami_id="${artifact##*:}"
          if [[ -z "$source_ami_id" ]]; then
            echo "Failed to parse source AMI ID from artifact: $artifact" >&2
            exit 1
          fi

          ami_name="$(aws ec2 describe-images \
            --region "$source_region" \
            --image-ids "$source_ami_id" \
            --query 'Images[0].Name' \
            --output text)"

          if [[ -z "$ami_name" || "$ami_name" == "None" ]]; then
            echo "Unable to resolve AMI name for $source_ami_id" >&2
            exit 1
          fi

          if [[ "$ami_name" != nat-zero-al2023-minimal-arm64-* ]]; then
            echo "Unexpected AMI name: $ami_name" >&2
            exit 1
          fi

          echo "source_ami_id=$source_ami_id" >> "$GITHUB_OUTPUT"
          echo "ami_name=$ami_name" >> "$GITHUB_OUTPUT"
          echo "Built source AMI: $source_ami_id ($ami_name)"

  integration_gate:
    if: ${{ inputs.run_integration_gate }}
    needs: build_ami
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: integration
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate source region for integration gate
        run: |
          if [[ "${{ inputs.source_region }}" != "us-east-1" ]]; then
            echo "Integration gate currently requires source_region=us-east-1" >&2
            exit 1
          fi

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: tests/integration/go.mod

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.INTEGRATION_ROLE_ARN }}
          aws-region: us-east-1

      - name: Validate baseline and replacement AMIs for integration gate
        env:
          BASELINE_AMI_ID: ${{ secrets.INTEGRATION_NAT_REPLACEMENT_AMI_ID }}
          REPLACEMENT_AMI_ID: ${{ needs.build_ami.outputs.source_ami_id }}
        run: |
          set -euo pipefail
          if [[ -z "$BASELINE_AMI_ID" ]]; then
            echo "Missing required secret: INTEGRATION_NAT_REPLACEMENT_AMI_ID" >&2
            exit 1
          fi
          if [[ -z "$REPLACEMENT_AMI_ID" ]]; then
            echo "Missing built source AMI ID from build_ami job output" >&2
            exit 1
          fi
          if [[ "$BASELINE_AMI_ID" == "$REPLACEMENT_AMI_ID" ]]; then
            echo "Baseline AMI and replacement AMI are identical; replacement test cannot run" >&2
            exit 1
          fi

      - name: Build Lambda binary
        working-directory: cmd/lambda
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -tags lambda.norpc -ldflags='-s -w' -o bootstrap
          zip lambda.zip bootstrap
          mkdir -p ../../.build
          cp lambda.zip ../../.build/lambda.zip

      - name: Run integration tests against built AMI
        working-directory: tests/integration
        env:
          TF_VAR_nat_ami_id: ${{ secrets.INTEGRATION_NAT_REPLACEMENT_AMI_ID }}
          NAT_AMI_REPLACEMENT_ID: ${{ needs.build_ami.outputs.source_ami_id }}
        run: go test -v -timeout 25m -count=1

  promote_ami:
    needs: [build_ami, integration_gate]
    if: ${{ needs.build_ami.result == 'success' && (needs.integration_gate.result == 'success' || needs.integration_gate.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: release
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ inputs.role_to_assume || secrets.AMI_BUILD_ROLE_ARN }}
          aws-region: ${{ inputs.source_region }}

      - name: Copy source AMI to enabled regions (parallel with retries)
        id: copy
        run: |
          set -euo pipefail

          source_region="${{ inputs.source_region }}"
          source_ami_id="${{ needs.build_ami.outputs.source_ami_id }}"
          ami_name="${{ needs.build_ami.outputs.ami_name }}"
          max_parallel=8
          max_attempts=20
          allow_non_blocking_regions=("me-central-1")

          mapfile -t regions < <(
            aws account list-regions \
              --region-opt-status-contains ENABLED ENABLED_BY_DEFAULT \
              --query 'Regions[].RegionName' \
              --output text | tr '\t' '\n' | sed '/^$/d' | sort
          )

          if [[ "${#regions[@]}" -eq 0 ]]; then
            echo "No enabled regions returned by account:list-regions" >&2
            exit 1
          fi

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT
          skipped_file="${tmp_dir}/skipped-regions"
          : > "$skipped_file"

          is_non_blocking_region() {
            local region="$1"
            local allowed
            for allowed in "${allow_non_blocking_regions[@]}"; do
              if [[ "$region" == "$allowed" ]]; then
                return 0
              fi
            done
            return 1
          }

          should_skip_non_blocking_error() {
            local region="$1"
            local err_file="$2"

            if ! is_non_blocking_region "$region"; then
              return 1
            fi

            if grep -Eq "AuthFailure|InternalError" "$err_file"; then
              return 0
            fi

            return 1
          }

          copy_with_retry() {
            local region="$1"
            local attempt=1
            local ami_id=""
            local existing_id=""
            local err_file="${tmp_dir}/err-${region}"

            while (( attempt <= max_attempts )); do
              existing_id="$(aws ec2 describe-images \
                --region "$region" \
                --owners self \
                --filters \
                  "Name=source-image-id,Values=${source_ami_id}" \
                  "Name=name,Values=${ami_name}" \
                  "Name=state,Values=pending,available" \
                --query 'reverse(sort_by(Images,&CreationDate))[0].ImageId' \
                --output text 2>/dev/null || true)"

              if [[ -n "$existing_id" && "$existing_id" != "None" ]]; then
                ami_id="$existing_id"
                echo "[$region] attempt ${attempt}: reusing existing copy $ami_id"
              else
                if ! ami_id="$(aws ec2 copy-image \
                  --region "$region" \
                  --source-region "$source_region" \
                  --source-image-id "$source_ami_id" \
                  --name "$ami_name" \
                  --description "Copy of ${source_ami_id} from ${source_region}" \
                  --copy-image-tags \
                  --query 'ImageId' \
                  --output text 2>"$err_file")"; then
                  if should_skip_non_blocking_error "$region" "$err_file"; then
                    echo "[$region] non-blocking copy error; skipping by policy"
                    printf '%s\n' "$region" >> "$skipped_file"
                    return 0
                  fi
                  echo "[$region] attempt ${attempt} copy-image failed: $(tr '\n' ' ' < "$err_file")"
                  sleep $((attempt * 6))
                  attempt=$((attempt + 1))
                  continue
                fi
                echo "[$region] attempt ${attempt}: started copy $ami_id"
              fi

              if aws ec2 wait image-available --region "$region" --image-ids "$ami_id" 2>"$err_file"; then
                echo "[$region] available: $ami_id"
                printf '%s:%s\n' "$region" "$ami_id" > "${tmp_dir}/result-${region}"
                return 0
              fi

              if should_skip_non_blocking_error "$region" "$err_file"; then
                echo "[$region] non-blocking wait error; skipping by policy"
                printf '%s\n' "$region" >> "$skipped_file"
                return 0
              fi

              echo "[$region] attempt ${attempt} failed; retrying..."
              sleep $((attempt * 6))
              attempt=$((attempt + 1))
            done

            echo "[$region] failed after ${max_attempts} attempts" >&2
            return 1
          }

          declare -a pids=()
          declare -a copy_regions=()

          for region in "${regions[@]}"; do
            if [[ "$region" == "$source_region" ]]; then
              continue
            fi

            while (( $(jobs -pr | wc -l) >= max_parallel )); do
              sleep 2
            done

            copy_regions+=("$region")
            (
              set -euo pipefail
              copy_with_retry "$region"
            ) >"${tmp_dir}/log-${region}" 2>&1 &
            pids+=("$!")
          done

          failed=0
          for i in "${!pids[@]}"; do
            region="${copy_regions[$i]}"
            if ! wait "${pids[$i]}"; then
              failed=1
              echo "[${region}] copy failed" >&2
            fi
            cat "${tmp_dir}/log-${region}" || true
          done

          if (( failed )); then
            echo "One or more region copies failed" >&2
            exit 1
          fi

          copied_table="${source_region}:${source_ami_id}"
          for region in "${regions[@]}"; do
            if [[ "$region" == "$source_region" ]]; then
              continue
            fi

            if grep -qx "$region" "$skipped_file"; then
              continue
            fi

            if [[ ! -s "${tmp_dir}/result-${region}" ]]; then
              echo "Missing copy result for region: $region" >&2
              exit 1
            fi

            copied_table+=$'\n'"$(cat "${tmp_dir}/result-${region}")"
          done

          {
            echo 'copied_table<<EOF'
            echo "$copied_table"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          skipped_regions="$(sort -u "$skipped_file" | sed '/^$/d' || true)"
          if [[ -n "$skipped_regions" ]]; then
            {
              echo 'skipped_regions<<EOF'
              echo "$skipped_regions"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Pin module default AMI and refresh docs
        run: |
          ami_name="${{ needs.build_ami.outputs.ami_name }}"

          awk -v ami_name="$ami_name" '
          BEGIN { in_block = 0; updated = 0 }
          $0 ~ /^variable "first_party_ami_name_pattern" \{/ { in_block = 1 }
          in_block && $0 ~ /^[[:space:]]*default[[:space:]]*=/ {
            sub(/"[^"]*"/, "\"" ami_name "\"")
            updated = 1
          }
          in_block && $0 ~ /^\}/ { in_block = 0 }
          { print }
          END {
            if (!updated) {
              print "Failed to update first_party_ami_name_pattern default in variables.tf" > "/dev/stderr"
              exit 1
            }
          }
          ' variables.tf > /tmp/variables.tf && mv /tmp/variables.tf variables.tf

          python3 -m pip install --user pre-commit
          export PATH="$HOME/.local/bin:$PATH"
          pre-commit run terraform-docs-go --all-files

      - name: Create promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes detected after AMI promotion."
            exit 0
          fi

          ami_name="${{ needs.build_ami.outputs.ami_name }}"
          source_ami_id="${{ needs.build_ami.outputs.source_ami_id }}"
          branch="automation/promote-first-party-ami-${{ github.run_id }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$branch"
          git add -A
          git commit -m "feat(ami): promote first-party AMI ${ami_name}"
          git push --set-upstream origin "$branch"

          cat > /tmp/pr_body.md <<EOF
          Built and promoted first-party NAT AMI.

          - Source AMI ID: \`${source_ami_id}\`
          - Source region: \`${{ inputs.source_region }}\`
          - AMI name: \`${ami_name}\`

          Copied AMIs:
          \`\`\`
          ${{ steps.copy.outputs.copied_table }}
          \`\`\`
          EOF

          skipped_regions="${{ steps.copy.outputs.skipped_regions }}"
          if [[ -n "$skipped_regions" ]]; then
            {
              echo
              echo "Skipped regions (auth-failure policy):"
              echo '```'
              echo "$skipped_regions"
              echo '```'
            } >> /tmp/pr_body.md
          fi

          gh pr create \
            --base main \
            --head "$branch" \
            --title "feat(ami): promote first-party AMI ${ami_name}" \
            --body-file /tmp/pr_body.md
