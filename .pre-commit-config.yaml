repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-yaml
        args: ["--unsafe"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-toml
      - id: check-json
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.8
    hooks:
      - id: actionlint
  - repo: https://github.com/TekWizely/pre-commit-golang
    rev: v1.0.0-rc.1
    hooks:
      - id: go-fmt
        name: go fmt
      - id: go-vet-repo-mod
        name: go vet
      - id: go-test-mod
        name: go test
        exclude: "tests/integration/"
  - repo: local
    hooks:
      - id: go-staticcheck
        name: go staticcheck
        language: system
        entry: bash -c 'export PATH="$HOME/go/bin:$PATH" && cd cmd/lambda && staticcheck ./...'
        files: '\.go$'
        exclude: "tests/integration/"
        pass_filenames: false
      - id: shellcheck
        name: shellcheck
        language: system
        entry: shellcheck
        files: '(^scripts/.*\.sh$|^ami/.*\.sh$)'
      - id: packer-fmt
        name: packer fmt
        language: system
        entry: bash -c 'cd ami && packer fmt -check -diff nat-zero.pkr.hcl'
        files: '^ami/.*\.(pkr\.hcl|hcl)$'
        pass_filenames: false
      - id: packer-validate
        name: packer validate
        language: system
        entry: bash -c 'cd ami && packer init nat-zero.pkr.hcl >/dev/null && packer validate -var "subnet_id=subnet-00000000000000000" nat-zero.pkr.hcl'
        files: '^ami/.*$'
        pass_filenames: false
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.16.4
    hooks:
      - id: gitleaks
  - repo: https://github.com/antonbabenko/pre-commit-terraform.git
    rev: v1.77.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
  - repo: https://github.com/terraform-docs/terraform-docs
    rev: "v0.16.0"
    hooks:
      - id: terraform-docs-go
        name: terraform-docs (README.md)
        args: ["--output-mode", "inject", "--output-file", "README.md", "."]
      - id: terraform-docs-go
        name: terraform-docs (docs/reference.md)
        args: ["-c", ".terraform-docs-reference.yml", "--output-mode", "replace", "--output-file", "docs/reference.md", "."]
