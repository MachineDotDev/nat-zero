repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-yaml
        args: ["--unsafe"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-toml
      - id: check-json
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: '\.sh$'
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci", "-sr", "-w"]
        files: '\.sh$'
  - repo: https://github.com/TekWizely/pre-commit-golang
    rev: v1.0.0-rc.1
    hooks:
      - id: go-fmt
        name: go fmt
      - id: go-vet-repo-mod
        name: go vet
      - id: go-test-mod
        name: go test
        exclude: "tests/integration/"
  - repo: local
    hooks:
      - id: go-staticcheck
        name: go staticcheck
        language: system
        entry: bash -c 'export PATH="$HOME/go/bin:$PATH" && cd cmd/lambda && staticcheck ./...'
        files: '\.go$'
        exclude: "tests/integration/"
        pass_filenames: false
      - id: packer-fmt
        name: packer fmt
        language: system
        entry: bash -c 'cd ami/first-party && packer fmt -check nat-zero.pkr.hcl'
        files: '^ami/first-party/.*\.pkr\.hcl$'
        pass_filenames: false
      - id: packer-validate-syntax
        name: packer validate (syntax-only)
        language: system
        entry: bash -c 'cd ami/first-party && packer validate -syntax-only nat-zero.pkr.hcl'
        files: '^ami/first-party/.*\.pkr\.hcl$'
        pass_filenames: false
      - id: nat-ami-bootstrap-constraints
        name: nat AMI bootstrap constraints
        language: system
        entry: bash -c 'set -euo pipefail; if rg -n "(169\\.254\\.169\\.254|\\baws\\b)" ami/first-party/files/*.sh ami/first-party/scripts/*.sh; then echo "Found forbidden IMDS/aws-cli usage in AMI scripts." >&2; exit 1; fi'
        files: '^ami/first-party/(files|scripts)/.*\.sh$'
        pass_filenames: false
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.16.4
    hooks:
      - id: gitleaks
  - repo: https://github.com/antonbabenko/pre-commit-terraform.git
    rev: v1.77.0
    hooks:
      - id: terraform_fmt
      - id: terraform_tflint
  - repo: https://github.com/terraform-docs/terraform-docs
    rev: "v0.16.0"
    hooks:
      - id: terraform-docs-go
        name: terraform-docs (README.md)
        args: ["--output-mode", "inject", "--output-file", "README.md", "."]
      - id: terraform-docs-go
        name: terraform-docs (docs/reference.md)
        args: ["-c", ".terraform-docs-reference.yml", "--output-mode", "replace", "--output-file", "docs/reference.md", "."]
